openapi: 3.0.3
info:
  title: Wallet Service API
  version: 2.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /v1/health:
    get:
      summary: Health probe
      parameters:
        - in: query
          name: probe
          schema:
            type: string
            enum: [liveness, readiness]
      responses:
        '200':
          description: Healthy
        '503':
          description: Unhealthy
  /v1/wallet/{userId}/tokens:
    get:
      summary: List wallet token lifecycle data for a user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User token list
        '403':
          description: Missing token.read scope
  /v1/wallet/{userId}/consents:
    get:
      summary: List wallet consent records for a user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User consent list
        '403':
          description: Missing consent.read scope
  /v1/wallet/delegations:
    post:
      summary: Create nominee/guardian delegation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ownerUserId, delegateUserId, scope, allowedPurposes, allowedFields, expiresAt]
              properties:
                ownerUserId:
                  type: string
                delegateUserId:
                  type: string
                scope:
                  type: string
                  example: consent.approve
                allowedPurposes:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  example: [loan-underwriting, insurance-claim]
                allowedFields:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  example: [fullName, idNumber]
                expiresAt:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Delegation created
        '400':
          description: Invalid delegation scope or constraints
        '403':
          description: Missing consent.approve scope
  /v1/wallet/{userId}/delegations:
    get:
      summary: List delegations for owner user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Delegation list
        '403':
          description: Missing consent.read scope
  /v1/wallet/delegations/{id}/revoke:
    post:
      summary: Revoke delegation by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Delegation revoked
        '403':
          description: Missing consent.approve scope
  /v1/wallet/consents/{consentId}/approve:
    post:
      summary: Approve consent by consentId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: consentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Consent approved
        '403':
          description: Missing consent.approve scope
  /v1/wallet/consents/{consentId}/reject:
    post:
      summary: Reject consent by consentId
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: consentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Consent rejected
        '403':
          description: Missing consent.approve scope
