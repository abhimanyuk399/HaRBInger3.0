{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $probes := ($svc.probes | default dict) }}
{{- $isWeb := eq ($svc.kind | default "backend") "web" }}
{{- $globalCloudSql := ($.Values.global.cloudSqlAuthProxy | default dict) }}
{{- $svcCloudSql := ($svc.cloudSqlAuthProxy | default dict) }}
{{- $cloudSqlEnabled := and (not $isWeb) (or ($globalCloudSql.enabled | default false) ($svcCloudSql.enabled | default false)) }}
{{- $cloudSqlPort := ($svcCloudSql.port | default ($globalCloudSql.port | default 5432)) }}
{{- $dbHost := $.Values.global.database.host }}
{{- $dbPort := $.Values.global.database.port }}
{{- if $cloudSqlEnabled }}
{{- $dbHost = "127.0.0.1" }}
{{- $dbPort = $cloudSqlPort }}
{{- end }}
{{- $databaseUrl := printf "postgresql://%s:%s@%s:%v/%s?schema=public" $.Values.global.database.user $.Values.global.database.password $dbHost $dbPort $.Values.global.database.name }}
{{- $redisUrl := ($.Values.global.redis.url | default (printf "redis://%s:%v" $.Values.global.redis.host $.Values.global.redis.port)) }}
{{- $serviceAccountName := "" }}
{{- if $.Values.serviceAccount.create }}
{{- $serviceAccountName = (default (include "bharat-kyc-t.fullname" $) $.Values.serviceAccount.name) }}
{{- else if $.Values.serviceAccount.name }}
{{- $serviceAccountName = $.Values.serviceAccount.name }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
{{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- if $serviceAccountName }}
      serviceAccountName: {{ $serviceAccountName }}
{{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $svc.image.pullPolicy | default $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort | default $svc.port }}
          env:
            - name: PORT
              value: "{{ $svc.port }}"
{{- if not $isWeb }}
            - name: SERVICE_NAME
              value: "{{ $svc.serviceName | default $name }}"
            - name: DATABASE_URL
              value: "{{ $databaseUrl }}"
            - name: REDIS_URL
              value: "{{ $redisUrl }}"
            - name: REDIS_HOST
              value: "{{ $.Values.global.redis.host }}"
            - name: REDIS_PORT
              value: "{{ $.Values.global.redis.port }}"
            - name: JWT_ISSUER
              value: "{{ $.Values.global.jwt.issuer }}"
            - name: JWT_AUDIENCE
              value: "{{ $.Values.global.jwt.audience }}"
            - name: JWKS_URL
              value: "{{ $.Values.global.jwt.jwksUrl }}"
            - name: REGISTRY_URL
              value: "{{ $.Values.global.registryUrl }}"
            - name: CONSENT_MANAGER_URL
              value: "{{ $.Values.global.consentManagerUrl }}"
            - name: CKYC_ADAPTER_URL
              value: "{{ $.Values.global.ckycAdapterUrl }}"
            - name: ISSUER_SERVICE_URL
              value: "{{ $.Values.global.issuerServiceUrl }}"
            - name: KEYCLOAK_ISSUER_URL
              value: "{{ $.Values.global.keycloak.issuerUrl }}"
            - name: KEYCLOAK_TOKEN_URL
              value: "{{ $.Values.global.keycloak.tokenUrl }}"
{{- if $.Values.global.keycloak.jwksUrl }}
            - name: KEYCLOAK_JWKS_URL
              value: "{{ $.Values.global.keycloak.jwksUrl }}"
{{- end }}
{{- end }}
{{- with $svc.env }}
{{ toYaml . | nindent 12 }}
{{- end }}
          readinessProbe:
            httpGet:
              path: {{ $svc.probePath | default "/v1/health" }}?probe=readiness
              port: {{ $svc.containerPort | default $svc.port }}
            initialDelaySeconds: {{ $probes.initialDelaySeconds | default 5 }}
            periodSeconds: {{ $probes.periodSeconds | default 10 }}
            timeoutSeconds: {{ $probes.timeoutSeconds | default 2 }}
            failureThreshold: {{ $probes.failureThreshold | default 6 }}
          livenessProbe:
            httpGet:
              path: {{ $svc.probePath | default "/v1/health" }}?probe=liveness
              port: {{ $svc.containerPort | default $svc.port }}
            initialDelaySeconds: {{ $probes.initialDelaySeconds | default 5 }}
            periodSeconds: {{ $probes.periodSeconds | default 10 }}
            timeoutSeconds: {{ $probes.timeoutSeconds | default 2 }}
            failureThreshold: {{ $probes.failureThreshold | default 6 }}
          resources:
{{ toYaml ($svc.resources | default $.Values.global.defaultResources) | nindent 12 }}
{{- if $cloudSqlEnabled }}
        - name: cloud-sql-proxy
          image: "{{ $svcCloudSql.image | default $globalCloudSql.image }}"
          imagePullPolicy: {{ $svcCloudSql.imagePullPolicy | default ($globalCloudSql.imagePullPolicy | default "IfNotPresent") }}
          args:
            - "--structured-logs"
            - "--address=0.0.0.0"
            - "--port={{ $cloudSqlPort }}"
{{- if ($svcCloudSql.privateIP | default ($globalCloudSql.privateIP | default false)) }}
            - "--private-ip"
{{- end }}
{{- if ($svcCloudSql.autoIAMAuthn | default ($globalCloudSql.autoIAMAuthn | default false)) }}
            - "--auto-iam-authn"
{{- end }}
{{- range $arg := ($svcCloudSql.extraArgs | default ($globalCloudSql.extraArgs | default list)) }}
            - {{ $arg | quote }}
{{- end }}
            - "{{ required (printf "Cloud SQL proxy enabled for %s, but instanceConnectionName is empty" $name) ($svcCloudSql.instanceConnectionName | default $globalCloudSql.instanceConnectionName) }}"
          securityContext:
            runAsNonRoot: true
          resources:
{{ toYaml ($svcCloudSql.resources | default ($globalCloudSql.resources | default dict)) | nindent 12 }}
{{- end }}
---
{{- end }}
{{- end }}
