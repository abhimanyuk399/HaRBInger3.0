{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "bharat-kyc-t.fullname" .) .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: {{ include "bharat-kyc-t.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- with .Values.serviceAccount.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- end }}
